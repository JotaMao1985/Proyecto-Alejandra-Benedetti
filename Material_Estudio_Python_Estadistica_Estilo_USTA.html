<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Arquitectura de Validación de Datos en Python para Inferencia Estadística - Material de Estudio USTA">
    <title>Arquitectura de Validación de Datos en Python para Inferencia Estadística</title>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts: Montserrat y Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3D008D',
                        secondary: '#ED1E79',
                        navy: '#001A4D',
                        gold: '#FDB913',
                        bg: '#F8FAFC',
                        surface: '#FFFFFF',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            scroll-behavior: smooth;
        }

        code,
        pre {
            font-family: 'Fira Code', monospace;
        }

        /* USTA Gradient Background */
        .usta-gradient {
            background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%);
        }

        /* USTA Navy Header */
        .usta-header {
            background: linear-gradient(180deg, #001A4D 0%, #002868 100%);
        }

        /* USTA Card Style */
        .usta-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .usta-card:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        /* Tip box USTA style */
        .tip-box {
            background: linear-gradient(135deg, rgba(61, 0, 141, 0.08) 0%, rgba(237, 30, 121, 0.08) 100%);
            border: 1px solid rgba(61, 0, 141, 0.2);
        }

        /* Sidebar active state */
        .nav-item.active {
            background: linear-gradient(90deg, rgba(61, 0, 141, 0.15) 0%, transparent 100%);
            border-left: 4px solid #ED1E79;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3D008D, #ED1E79);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #4A00A8, #FF2D8A);
        }

        /* Code scrollbar */
        .code-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .code-scroll::-webkit-scrollbar-track {
            background: #2d2d2d;
        }

        .code-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3D008D, #ED1E79);
            border-radius: 4px;
        }

        /* Fade-in animation */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Focus styles for accessibility */
        button:focus-visible {
            outline: 2px solid #ED1E79;
            outline-offset: 2px;
        }

        /* Syntax highlighting */
        .syntax-kwd {
            color: #c678dd;
            font-weight: bold;
        }

        .syntax-cls {
            color: #e5c07b;
        }

        .syntax-str {
            color: #98c379;
        }

        .syntax-com {
            color: #5c6370;
            font-style: italic;
        }

        .syntax-func {
            color: #61afef;
        }

        .syntax-self {
            color: #e06c75;
            font-style: italic;
        }

        .syntax-num {
            color: #d19a66;
        }

        .diagram {
            font-family: 'Fira Code', monospace;
            white-space: pre;
            background: #fff;
            border: 1px dashed #999;
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
            font-size: 0.85rem;
            color: #333;
            border-radius: 8px;
        }

        /* Module section styling */
        .module-section {
            scroll-margin-top: 100px;
        }

        /* Table styling */
        .usta-table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.95rem;
        }

        .usta-table th,
        .usta-table td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            text-align: left;
        }

        .usta-table th {
            background: linear-gradient(140deg, #3D008D 0%, #ED1E79 100%);
            color: white;
            font-weight: 600;
        }

        .usta-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .usta-table tr:hover {
            background-color: #f1f3f5;
        }

        /* Warning box */
        .warning-box {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 8px 8px 0;
        }

        /* Evaluation box */
        .evaluation-box {
            background: #fff8e1;
            padding: 2rem;
            border: 1px solid #ffecb3;
            border-radius: 8px;
            margin: 2.5rem 0;
        }

        /* References section */
        .references-section {
            background: linear-gradient(135deg, rgba(61, 0, 141, 0.05) 0%, rgba(237, 30, 121, 0.05) 100%);
            padding: 2rem;
            border-radius: 16px;
            margin-top: 4rem;
            border: 1px solid rgba(61, 0, 141, 0.1);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Definición de Iconos (SVG Inline) ---
        const Icons = {
            BookOpen: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            ),
            Database: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s 9-1.34 9-3V5"></path>
                </svg>
            ),
            CheckSquare: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
            ),
            Layers: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            ),
            AlertTriangle: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            ),
            ChevronLeft: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            ),
            ChevronRight: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            ),
            Menu: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            ),
            X: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            )
        };

        // --- Componente Tooltip ---
        const Tooltip = ({ children, title, text, color = '#3D008D' }) => {
            const [show, setShow] = useState(false);
            return (
                <span className="relative inline-block"
                    onMouseEnter={() => setShow(true)}
                    onMouseLeave={() => setShow(false)}
                    onFocus={() => setShow(true)}
                    onBlur={() => setShow(false)}
                    tabIndex="0"
                >
                    <span className="cursor-help border-b-2 border-dashed font-bold" style={{ borderColor: color, color }}>{children}</span>
                    {show && (
                        <div className="absolute z-50 bottom-full left-1/2 -translate-x-1/2 mb-2 w-72 p-4 rounded-xl shadow-2xl border text-left animate-fade-in"
                            style={{ background: 'white', borderColor: color }}
                        >
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-2.5 h-2.5 rounded-full" style={{ background: color }}></div>
                                <span className="font-bold text-sm" style={{ color }}>{title}</span>
                            </div>
                            <p className="text-xs text-gray-600 leading-relaxed">{text}</p>
                            <div className="absolute left-1/2 -translate-x-1/2 top-full w-0 h-0"
                                style={{ borderLeft: '8px solid transparent', borderRight: '8px solid transparent', borderTop: `8px solid ${color}` }}
                            ></div>
                        </div>
                    )}
                </span>
            );
        };

        // --- Componente CodeBlock ---
        const CodeBlock = ({ title, code }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                navigator.clipboard.writeText(code).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };
            return (
                <div className="my-4 rounded-xl overflow-hidden border border-gray-700 bg-gray-900 text-gray-100 shadow-lg">
                    <div className="bg-gray-800 px-4 py-2 text-xs font-mono text-gray-400 border-b border-gray-700 flex justify-between items-center">
                        <span><i className="fab fa-python text-yellow-400 mr-2"></i>{title || 'Código Python'}</span>
                        <span className="flex items-center gap-3">
                            <button
                                onClick={handleCopy}
                                className="flex items-center gap-1 hover:text-white transition-colors"
                                title="Copiar código"
                            >
                                {copied
                                    ? <><i className="fas fa-check text-green-400"></i><span className="text-green-400">¡Copiado!</span></>
                                    : <><i className="far fa-clipboard"></i><span>Copiar</span></>
                                }
                            </button>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-red-500"></div><div className="w-2 h-2 rounded-full bg-yellow-500"></div><div className="w-2 h-2 rounded-full bg-green-500"></div></span>
                        </span>
                    </div>
                    <div className="p-4 overflow-x-auto code-scroll">
                        <pre className="text-sm leading-relaxed"><code dangerouslySetInnerHTML={{
                            __html: code.replace(/#.*/g, match => `<span class="text-green-500 italic">${match}</span>`)
                                .replace(/"""[\s\S]*?"""/g, match => `<span class="text-green-500 italic">${match}</span>`)
                                .replace(/class /g, '<span class="text-pink-500">class </span>')
                                .replace(/def /g, '<span class="text-pink-500">def </span>')
                                .replace(/from /g, '<span class="text-pink-500">from </span>')
                                .replace(/import /g, '<span class="text-pink-500">import </span>')
                                .replace(/return /g, '<span class="text-pink-500">return </span>')
                                .replace(/if /g, '<span class="text-pink-500">if </span>')
                                .replace(/else:/g, '<span class="text-pink-500">else:</span>')
                                .replace(/elif /g, '<span class="text-pink-500">elif </span>')
                                .replace(/for /g, '<span class="text-pink-500">for </span>')
                                .replace(/while /g, '<span class="text-pink-500">while </span>')
                                .replace(/try:/g, '<span class="text-pink-500">try:</span>')
                                .replace(/except /g, '<span class="text-pink-500">except </span>')
                                .replace(/raise /g, '<span class="text-pink-500">raise </span>')
                                .replace(/print/g, '<span class="text-blue-400">print</span>')
                                .replace(/int/g, '<span class="text-blue-400">int</span>')
                                .replace(/str/g, '<span class="text-blue-400">str</span>')
                                .replace(/float/g, '<span class="text-blue-400">float</span>')
                                .replace(/BaseModel/g, '<span class="text-yellow-400">BaseModel</span>')
                                .replace(/Field/g, '<span class="text-yellow-400">Field</span>')
                                .replace(/field_validator/g, '<span class="text-yellow-400">field_validator</span>')
                                .replace(/ValidationError/g, '<span class="text-yellow-400">ValidationError</span>')
                                .replace(/Optional/g, '<span class="text-yellow-400">Optional</span>')
                                .replace(/List/g, '<span class="text-yellow-400">List</span>')
                                .replace(/Union/g, '<span class="text-yellow-400">Union</span>')
                                .replace(/ClassVar/g, '<span class="text-yellow-400">ClassVar</span>')
                                .replace(/Dict/g, '<span class="text-yellow-400">Dict</span>')
                                .replace(/Any/g, '<span class="text-yellow-400">Any</span>')
                                .replace(/@field_validator/g, '<span class="text-orange-400">@field_validator</span>')
                                .replace(/@classmethod/g, '<span class="text-orange-400">@classmethod</span>')
                                .replace(/@functools.wraps/g, '<span class="text-orange-400">@functools.wraps</span>')
                                .replace(/self/g, '<span class="text-red-400 italic">self</span>')
                                .replace(/cls/g, '<span class="text-red-400 italic">cls</span>')
                                .replace(/True/g, '<span class="text-blue-400">True</span>')
                                .replace(/False/g, '<span class="text-blue-400">False</span>')
                                .replace(/None/g, '<span class="text-blue-400">None</span>')
                                .replace(/\b\d+\.?\d*\b/g, match => `<span class="text-orange-400">${match}</span>`)
                        }} /></pre>
                    </div>
                </div>
            );
        };

        // --- Componente SectionHeader ---
        const SectionHeader = ({ title, icon: Icon, subtitle }) => (
            <div className="flex items-center gap-3 mb-4 border-b border-gray-200 pb-3">
                <div className="usta-gradient p-2.5 rounded-xl shadow-md text-white">
                    {Icon && <Icon size={24} />}
                </div>
                <div>
                    <h2 className="text-2xl font-bold text-gray-900">{title}</h2>
                    {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
                </div>
            </div>
        );

        // --- Componente de Navegación Lateral ---
        const Sidebar = ({ modules, currentModule, onSelectModule, isOpen, onClose }) => (
            <>
                {/* Overlay para móvil */}
                {isOpen && (
                    <div 
                        className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden"
                        onClick={onClose}
                    ></div>
                )}
                
                <aside className={`fixed top-0 left-0 h-full w-72 usta-header text-white z-50 transform transition-transform duration-300 ease-in-out ${isOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                    <div className="p-6">
                        <div className="flex items-center justify-between mb-6">
                            <h1 className="text-lg font-bold">Validación de Datos</h1>
                            <button 
                                onClick={onClose}
                                className="lg:hidden p-2 hover:bg-white/10 rounded-lg transition-colors"
                            >
                                <Icons.X size={20} />
                            </button>
                        </div>
                        
                        <nav className="space-y-2">
                            {modules.map((module, idx) => {
                                const Icon = module.icon;
                                const isActive = currentModule === idx;
                                return (
                                    <button
                                        key={idx}
                                        onClick={() => {
                                            onSelectModule(idx);
                                            onClose();
                                        }}
                                        className={`nav-item w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3 ${isActive ? 'active bg-white/10' : 'hover:bg-white/5'}`}
                                    >
                                        <Icon size={18} />
                                        <span className="text-sm font-medium">{module.title}</span>
                                    </button>
                                );
                            })}
                        </nav>

                        <div className="absolute bottom-6 left-6 right-6">
                            <div className="bg-white/10 rounded-lg p-4">
                                <p className="text-xs text-gray-300">Material de Estudio</p>
                                <p className="text-sm font-bold mt-1">Python para Estadística</p>
                                <p className="text-xs text-gray-400 mt-2">USTA 2026-I</p>
                            </div>
                        </div>
                    </div>
                </aside>
            </>
        );

        // --- Componente Quiz Interactivo ---
        const InteractiveQuiz = () => {
            const [currentQ, setCurrentQ] = useState(0);
            const [selected, setSelected] = useState(null);
            const [answered, setAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [finished, setFinished] = useState(false);
            const [answers, setAnswers] = useState([]);

            const questions = [
                {
                    topic: 'Módulo 1 — Tipos Complejos',
                    question: '¿Qué representa Optional[int] en el contexto estadístico?',
                    options: [
                        'Un número entero opcional que puede ser cero',
                        'Una variable que puede ser un entero o estar explícitamente ausente (dato faltante)',
                        'Un entero que se puede omitir en los cálculos',
                        'Un tipo de dato que no es necesario validar'
                    ],
                    correct: 1,
                    explanation: 'Optional[int] (o int | None) formaliza explícitamente la posibilidad de un dato faltante, equivalente metodológico a documentar mecanismos de pérdida como MCAR o MAR.'
                },
                {
                    topic: 'Módulo 1 — Tipos Complejos',
                    question: '¿Cuál es el riesgo de usar List[Any] en análisis estadístico?',
                    options: [
                        'No hay riesgo, es más flexible',
                        'Permite la mezcla de tipos heterogéneos que contaminan las medidas de resumen',
                        'Es más lento que List[int]',
                        'No es compatible con Pydantic'
                    ],
                    correct: 1,
                    explanation: 'List[Any] inhabilita la inspección rigurosa, permitiendo la interpolación silente de caracteres con números, rompiendo la distribución idénticamente independiente del vector paramétrico.'
                },
                {
                    topic: 'Módulo 2 — Validadores',
                    question: '¿Qué diferencia hay entre mode="before" y mode="after" en @field_validator?',
                    options: [
                        'No hay diferencia, son intercambiables',
                        'before opera en datos crudos, after valida sobre tipos ya coercicionados',
                        'before es más rápido que after',
                        'after solo funciona con strings'
                    ],
                    correct: 1,
                    explanation: 'mode="before" procesa datos desorganizados antes de la coerción de tipos (ej. parseando strings), mientras mode="after" audita el axioma exacto sobre el tipo ya validado.'
                },
                {
                    topic: 'Módulo 2 — Validadores',
                    question: '¿Por qué es perjudicial usar mutaciones silentes (como abs()) en validadores?',
                    options: [
                        'Porque es más lento',
                        'Porque no es compatible con Pydantic V2',
                        'Transforma clandestinamente la covarianza de origen, oscureciendo debilidades de medición',
                        'Porque genera errores de sintaxis'
                    ],
                    correct: 2,
                    explanation: 'Transformar silenciosamente los datos oculta las debilidades de los instrumentos de medición. Lo dogmático es alertar mediante excepciones para dejar huella formal e intervenir en capas posteriores.'
                },
                {
                    topic: 'Módulo 3 — Jerarquía',
                    question: '¿Qué sucede cuando un elemento anidado falla en una estructura jerárquica?',
                    options: [
                        'Se ignora el elemento y continúa el procesamiento',
                        'Fallará transaccionalmente toda la estructura contenedora',
                        'Se reemplaza con un valor por defecto',
                        'Se guarda parcialmente el resto de datos'
                    ],
                    correct: 1,
                    explanation: 'Pydantic opera transaccionalmente con principios ACID estadísticos. Fallará la integridad total del lote macroscópico inmediatamente, emitiendo excepciones exhaustivas localizando la falla.'
                },
                {
                    topic: 'Módulo 4 — HTTP 422',
                    question: '¿Qué indica un error HTTP 422 en una API de validación?',
                    options: [
                        'El servidor no está disponible',
                        'El JSON tiene errores de sintaxis',
                        'El documento es sintácticamente correcto pero viola parámetros semánticos',
                        'La autenticación falló'
                    ],
                    correct: 2,
                    explanation: 'HTTP 422 (Unprocessable Entity) indica que el JSON tiene perfecta sintaxis pero viola parámetros matemáticos explícitos (ej. edad negativa). Es una validación algorítmica que reta supuestos numéricos.'
                }
            ];

            const handleSelect = (idx) => {
                if (answered) return;
                setSelected(idx);
                setAnswered(true);
                const isCorrect = idx === questions[currentQ].correct;
                if (isCorrect) setScore(s => s + 1);
                setAnswers(prev => [...prev, { question: currentQ, selected: idx, correct: questions[currentQ].correct, isCorrect }]);
            };

            const handleNext = () => {
                if (currentQ < questions.length - 1) {

# 1. Decorador de medición de complejidad temporal para simulaciones pesadas
def cronometrar_bootstrap(func):
    """Mide eficiencia asintótica de las rutinas iterativas de carga muestral"""
    @functools.wraps(func)
    def envoltorio_tiempo(*args, **kwargs):
        inicio = time.perf_counter()
        resultado = func(*args, **kwargs)
        print(f"La simulación iterativa concluyó eficientemente en {time.perf_counter() - inicio:.5f}s")
        return resultado
    return envoltorio_tiempo

# 2. Establecer modelo probabilístico para observación aislada
class ObservacionIris(BaseModel):
    especie_taxonomica: str
    sepal_length: float
    sepal_width: float

    # Constante escalar estática del hiperespacio
    ESPECIES_PERMITIDAS: ClassVar[list] = ["setosa", "versicolor", "virginica"]

    @field_validator('especie_taxonomica')
    @classmethod
    def validar_factor_categorico(cls, valor: str) -> str:
        """Garantiza la limpieza estocástica evitando 'niveles fantasma' en tablas de Chi-Cuadrado"""
        valor_limpio = valor.strip().lower()
        if valor_limpio not in cls.ESPECIES_PERMITIDAS:

        return valor_limpio

    @field_validator('sepal_length', 'sepal_width', mode='after')
    @classmethod
    def auditar_axiomas_biologicos(cls, valor: float) -> float:
        """La métrica morfológica solo reside topológicamente en reales positivos"""
        if valor <= 0:

        if valor > 50.0:
